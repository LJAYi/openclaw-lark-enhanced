name: Bug report
description: Report a problem with openclaw-lark-enhanced
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: 0.1.2
  - type: input
    id: openclaw_version
    attributes:
      label: OpenClaw version
      placeholder: 2026.4.7
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, channel, and whether this is Feishu group/thread/direct.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
